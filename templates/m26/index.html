<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Amule M26</title>
	<link rel="icon" href="favicon.ico" />
	<link rel="manifest" href="manifest.json" />
	<meta name="theme-color" content="#2c3e50" />
	<link rel="stylesheet" href="font-awesome-4.7.0.css" />
	<link rel="stylesheet" href="app.css" />
	<script>
		// pre-paint theme (same storage key as the upstream and login.php)
		(function () {
			try {
				var q = new URLSearchParams(location.search).get('theme');
				var t = (q === 'dark' || q === 'light') ? q : localStorage.getItem('m26-color-theme-name');
				if (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
				if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
			} catch (e) { /* ignore */ }
		})();
	</script>
</head>

<body>
	<div id="app">
		<div id="boot" style="padding:60px 16px;text-align:center;color:ivory">
			<noscript>This control panel requires JavaScript.</noscript>
			<span id="boot-msg">Loading…</span>
		</div>
	</div>
	<script type="module">
		import('./app.js').catch((err) => {
			const el = document.getElementById('boot-msg');
			if (el) {
				el.innerHTML =
					'Could not start the control panel.<br><br><code>' +
					(err && err.message ? err.message : err) + '</code><br><br>' +
					'The Preact+HTM module or the Font Awesome CSS may be missing — run ' +
					'the dependency download script (see the repository dev/ folder).';
			}
		});
	</script>
</body>
</html>
