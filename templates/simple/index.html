<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="color-scheme" content="light dark" />
	<meta name="theme-color" content="#2d7ff9" />
	<title>aMule Web Control</title>
	<link rel="icon" href="favicon.ico" />
	<link rel="manifest" href="manifest.json" />
	<link rel="stylesheet" href="app.css" />
</head>
<body>
	<div id="app">
		<!-- Replaced once the SPA mounts. Visible if JS is disabled or the
		     Preact+HTM module has not been downloaded yet (see download-deps). -->
		<div id="boot" style="padding:48px;text-align:center;color:#888;font-family:sans-serif">
			<noscript>This control panel requires JavaScript.</noscript>
			<span id="boot-msg">Loading…</span>
		</div>
	</div>

	<script type="module">
		import('./app.js').catch((err) => {
			const el = document.getElementById('boot-msg');
			if (el) {
				el.innerHTML =
					'Could not start the control panel.<br><br><code>' +
					(err && err.message ? err.message : err) + '</code><br><br>' +
					'The Preact+HTM module may be missing — run the dependency ' +
					'download script (see dev/).';
			}
		});
	</script>
</body>
</html>
