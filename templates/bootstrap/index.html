<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
	<meta name="description" content="aMule Web Bootstrap theme" />
	<title>aMule Web</title>

	<link href="bootstrap-reboot.min.css" rel="stylesheet" />
	<link href="bootstrap.min.css" rel="stylesheet" />
	<link href="app.css" rel="stylesheet" />

	<link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180" />
	<link rel="icon" href="favicon-32x32.png" sizes="32x32" type="image/png" />
	<link rel="icon" href="favicon-16x16.png" sizes="16x16" type="image/png" />
	<link rel="manifest" href="manifest.json" />
	<link rel="icon" href="favicon.ico" />
	<meta name="msapplication-config" content="browserconfig.xml" />
	<meta name="theme-color" content="#563d7c" />
</head>

<body>

	<div id="app">
		<div id="boot" style="padding:80px 16px 16px;text-align:center">
			<noscript>This control panel requires JavaScript.</noscript>
			<span id="boot-msg">Loading…</span>
		</div>
	</div>
	<script type="module">
		import('./app.js').catch((err) => {
			const el = document.getElementById('boot-msg');
			if (el) {
				el.innerHTML =
					'Could not start the control panel.<br><br><code>' +
					(err && err.message ? err.message : err) + '</code><br><br>' +
					'The Preact+HTM module or the Bootstrap CSS may be missing — run ' +
					'the dependency download script (see the repository dev/ folder).';
			}
		});
	</script>
</body>
</html>
