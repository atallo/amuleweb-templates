<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="color-scheme" content="light dark" />
	<title>aMule — mock preview (dev)</title>
	<link rel="icon" href="../templates/simple/favicon.ico" />
	<link id="tpl-css" rel="stylesheet" href="../templates/simple/app.css" />
</head>
<body>
	<div id="app">
		<div id="boot" style="padding:48px;text-align:center;color:#888;font-family:sans-serif">Loading mock preview…</div>
	</div>
	<!--
		Dev-only preview: loads canned data (mock.js), then the real SPA of a
		template. Serve the REPOSITORY ROOT with any static server and open
		this folder:

		    python3 -m http.server 8080
		    →  http://localhost:8080/dev/

		Pick a template with ?template=<name> (default: simple), e.g.
		    http://localhost:8080/dev/?template=simple#stats

		The template's own module resolution works because download-deps
		mirrors the Preact+HTM module into each template directory.
	-->
	<script type="module">
		const tpl = new URLSearchParams(location.search).get('template') || 'simple';
		// Dev-only cache buster so edits show up on plain reload.
		const v = Date.now();
		// Load the same stylesheets, in the same order, that the template's
		// real shell declares — works for any template without hardcoding.
		// id and disabled are preserved so per-template theme switching
		// (e.g. mobilemule's dark mode) behaves like in production.
		const shell = await (await fetch(`../templates/${tpl}/index.html?v=${v}`)).text();
		const tags = [...shell.matchAll(/<link\b[^>]*>/g)].map((m) => m[0])
			.filter((t) => /rel="stylesheet"/.test(t));
		const links = tags.map((t) => ({
			href: (t.match(/href="([^"]+)"/) || [])[1],
			id: (t.match(/id="([^"]+)"/) || [])[1],
			disabled: /\bdisabled\b/.test(t),
		})).filter((x) => x.href);
		for (const it of (links.length ? links : [{ href: 'app.css' }])) {
			const l = document.createElement('link');
			l.rel = 'stylesheet';
			if (it.id) l.id = it.id;
			l.href = `../templates/${tpl}/${it.href}?v=${v}`;
			if (it.disabled) l.disabled = true;
			document.head.appendChild(l);
		}
		document.getElementById('tpl-css').remove();
		await import('./mock.js');
		await import(`../templates/${tpl}/app.js?v=${v}`);
	</script>
</body>
</html>
