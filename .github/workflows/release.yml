#
# When a version tag (v*) is pushed, assemble every template into a flat,
# ready-to-install directory and publish the release assets: one zip per
# template (so nobody has to download everything for a single skin) plus a
# bundle zip containing all of them.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Fetch front-end dependency
        run: sh dev/download-deps.sh

      - name: Assemble templates
        run: sh scripts/build.sh

      - name: Package zips
        run: |
          cd dist
          # one zip per template...
          for d in */ ; do
            n="${d%/}"
            zip -qr "amuleweb-template-${n}-${GITHUB_REF_NAME}.zip" "$n"
          done
          # ...and a bundle with every template (directories only, so the
          # per-template zips created above are not re-packed)
          zip -qr "amuleweb-templates-bundle-${GITHUB_REF_NAME}.zip" ./*/
          ls -l ./*.zip

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.zip \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
